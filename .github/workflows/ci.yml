name: CI

on:
  push:
    branches:
      - main
      - public-alpha-candidate-v2.2
  pull_request:

jobs:
  community-core:
    name: Community core checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libportaudio2 portaudio19-dev

      - name: Install Python package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[audio,asr]"

      - name: Ensure no unsafe tracked files
        shell: bash
        run: |
          set -euo pipefail

          if git ls-files | grep -Ei '\.(wav|mp3|m4a|flac|aac)$'; then
            echo "Raw audio/media files must not be tracked."
            exit 1
          fi

          if git ls-files | grep -Ei '(__pycache__|\.pyc$|\.pyo$)'; then
            echo "Python cache files must not be tracked."
            exit 1
          fi

          if git ls-files | grep -Ei '(^|/)\._|\.DS_Store$'; then
            echo "macOS metadata files must not be tracked."
            exit 1
          fi

          if git ls-files | grep -E '(^|/)(mic_alpha_live|mic_minutes_live|asr_minutes_faster_whisper|real_mac_evidence|evidence_export|maintainer_dashboard|public_alpha_candidate|screenshots)/'; then
            echo "Generated evidence/review directories must not be tracked."
            exit 1
          fi

      - name: Ensure no private/personal path leaks
        shell: bash
        run: |
          set -euo pipefail

          # Avoid CI self-matches by excluding this workflow file from leak-pattern scans.
          SEARCH_PATHS=(-- . ':(exclude).github/workflows/ci.yml')

          if git grep -n -E '/Users/[A-Za-z0-9._-]+' "${SEARCH_PATHS[@]}"; then
            echo "Personal absolute path detected."
            exit 1
          fi

          if git grep -n -E '\.venv312' "${SEARCH_PATHS[@]}"; then
            echo "Old local venv reference detected."
            exit 1
          fi

          if git grep -n -E 'v2\.0 Public Alpha|2\.0 Public Alpha|ai-meeting-agent-community-v1\.9' "${SEARCH_PATHS[@]}"; then
            echo "Old public alpha/version reference detected."
            exit 1
          fi

      - name: Release check
        run: |
          PYTHONPATH=src python -m meeting_agent release-check \
            --root . \
            --out-json release_check.json \
            --out-md release_check.md

          python - <<'PY'
          import json
          data = json.load(open("release_check.json"))
          assert data["status"] == "pass", data
          assert data.get("private_core_included") is False or "private_core_included" not in data, data
          PY

      - name: Publication gate must remain on hold
        run: |
          PYTHONPATH=src python -m meeting_agent publication-gate \
            --root . \
            --out-json publication_gate.json \
            --out-md publication_gate.md

          python - <<'PY'
          import json
          data = json.load(open("publication_gate.json"))
          assert data["status"] == "hold", data
          assert "public_github_repository" in data.get("blocked_modes", []), data
          assert data.get("private_core_included") is False, data
          PY

      - name: Public unlock preflight must remain on HOLD
        run: |
          bash scripts/public_unlock_preflight.sh

      - name: Private alpha gate
        run: |
          PYTHONPATH=src python -m meeting_agent private-alpha-gate --root .

      - name: Unit tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -v
